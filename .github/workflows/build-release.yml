name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name PinterestCrawler `
            --icon log.ico `
            --add-data "log.ico;." `
            --add-data "pinterest_crawler.py;." `
            --collect-all selenium `
            --collect-all webdriver_manager `
            --collect-all requests `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.IcoImagePlugin `
            app.py

      - name: Verify build output
        run: dir dist\

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows Installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          Write-Host "Building installer version: $version"
          & $iscc /DMyAppVersion="$version" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dir installer_output\

      - name: Generate artifact attestation (portable exe)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/PinterestCrawler.exe

      - name: Generate artifact attestation (installer)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: installer_output/PinterestCrawler_Setup_*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/PinterestCrawler_Setup_*.exe
            dist/PinterestCrawler.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Pinterest 高清图片爬取工具 ${{ github.ref_name }}

            ### 📦 两种下载方式

            | 文件 | 说明 | 推荐 |
            |------|------|------|
            | `PinterestCrawler_Setup_*.exe` | **安装程序** — 有开始菜单、桌面图标、卸载程序 | ✅ 推荐 |
            | `PinterestCrawler.exe` | 便携版 — 单文件，双击即用 | 备用 |

            ### 安装步骤（安装程序版）
            1. 下载 `PinterestCrawler_Setup_*.exe`
            2. 双击安装，按向导操作
            3. 从开始菜单或桌面快捷方式启动

            ### 功能
            - 支持关键词 / Pinterest 链接两种爬取模式
            - 分层爬取（第一层最相关 + 延申扩展）
            - 高清原图自动升级（originals/736x）
            - 系统托盘图标（最小化后继续运行）
            - 现代深色主题 UI

            ### 系统要求
            - Windows 10/11 (64位)
            - Google Chrome 浏览器
            - 网络连接（可访问 Pinterest）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
